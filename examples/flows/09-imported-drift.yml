# Cairntrace example spec — drift inside an imported action.
#
# The action at examples/actions/open_dashboard.yml has a stale locator name.
# Running this spec fails (the link can't be clicked). Running
# `cairn spec heal --apply examples/flows/09-imported-drift.yml` should
# patch the ACTION FILE (open_dashboard.yml), not this spec — because heal
# follows the origin of the failed step.
#
# After healing, re-run this spec to confirm it passes.
#
version: 1
name: imported_drift_demo
intent: drift inside an imported action — heal must patch the action file
environment: local
preconditions:
  commands:
    - run: "echo demo-app must be running on :8787"
imports:
  - ../actions/open_dashboard.yml
outcomes:
  - id: url_is_dashboard
    description: after the use:action, URL ends with /dashboard.html
    verify:
      url:
        endsWith: /dashboard.html
steps:
  - use: open_dashboard
